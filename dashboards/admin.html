<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B3A6B;--blue:#2563A8;--green:#1E7E34;--amber:#B8860B;--red:#C0392B;--teal:#0D7377;--purple:#6C3483;--orange:#E67E22;--gray:#6B7A99;--bg:#F0F3F8;--surface:#FFFFFF;--border:#D0D7E2;--text:#1A1A2E;--muted:#6B7A99}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}#loginScreen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999}.login-box{background:#fff;border-radius:16px;padding:48px;width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.3)}.login-logo{font-size:40px;margin-bottom:12px}.login-box h2{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px}.login-box p{font-size:13px;color:var(--muted);margin-bottom:28px}.login-box input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;transition:.2s}.login-box input:focus{border-color:var(--blue)}.login-btn{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}.login-btn:hover{background:var(--blue)}.login-error{color:var(--red);font-size:13px;margin-top:8px;display:none}#app{display:none}.topbar{background:var(--navy);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}.topbar-left{display:flex;align-items:center;gap:12px}.topbar-logo{font-size:20px}.topbar-title{font-size:16px;font-weight:700;color:#fff}.topbar-badge{background:rgba(255,193,7,.15);color:#FFC107;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,193,7,.3)}.topbar-right{display:flex;align-items:center;gap:16px;color:#fff;font-size:13px}.topbar-right button{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}.topbar-right button:hover{background:rgba(255,255,255,.2)}.sync-dot{width:8px;height:8px;border-radius:50%;background:#1E7E34;display:inline-block;margin-right:6px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px}.tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;font-family:inherit}.tab:hover{color:var(--navy)}.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}.content{padding:24px;max-width:1400px;margin:0 auto}.tab-pane{display:none}.tab-pane.active{display:block}.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}.kpi-card{background:var(--surface);border-radius:12px;padding:16px 20px;border:1px solid var(--border);transition:.2s}.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}.kpi-val{font-size:32px;font-weight:700;line-height:1}.kpi-lbl{font-size:11px;font-weight:600;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}.kpi-card.navy .kpi-val{color:var(--navy)}.kpi-card.blue .kpi-val{color:var(--blue)}.kpi-card.green .kpi-val{color:var(--green)}.kpi-card.teal .kpi-val{color:var(--teal)}.kpi-card.gray .kpi-val{color:var(--gray)}.kpi-card.red .kpi-val{color:var(--red)}.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.section-title{font-size:15px;font-weight:700;color:var(--navy)}.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.2s;display:inline-flex;align-items:center;gap:6px}.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--blue)}.btn-success{background:var(--green);color:#fff}.btn-danger{background:var(--red);color:#fff}.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--bg)}.btn-sm{padding:5px 12px;font-size:12px}.type-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:.2s}.pill.active,.pill:hover{opacity:1}.pill-all{background:#E8EDF5;color:var(--navy);border-color:#D0D7E2}.pill-content{background:#D0F0F0;color:var(--teal);border-color:var(--teal)}.pill-software{background:#EEF4FC;color:var(--blue);border-color:var(--blue)}.pill-marketing{background:#EDE0F5;color:var(--purple);border-color:var(--purple)}.pill-initiatives{background:#FDE8D8;color:var(--orange);border-color:var(--orange)}.pill-sales{background:#D4EDDA;color:var(--green);border-color:var(--green)}.tbl-wrap{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}.tbl{width:100%;border-collapse:collapse;font-size:13px}.tbl th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:#F8FAFC}.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}.badge-active{background:#D6E4F7;color:#2563A8}.badge-completed{background:#D4EDDA;color:#1E7E34}.badge-onhold{background:#FFF3CD;color:#B8860B}.badge-upcoming{background:#D0F0F0;color:#0D7377}.badge-cancelled{background:#F8D7DA;color:#C0392B}.badge-green{background:#D4EDDA;color:#1E7E34}.badge-amber{background:#FFF3CD;color:#B8860B}.badge-red{background:#F8D7DA;color:#C0392B}.badge-yes{background:#D4EDDA;color:#1E7E34}.badge-no{background:#F5F7FA;color:#6B7A99}.prog-wrap{display:flex;align-items:center;gap:8px}.prog-bar{flex:1;height:6px;background:#E8EDF5;border-radius:3px;min-width:60px;overflow:hidden}.prog-fill{height:100%;border-radius:3px;transition:.3s}.prog-lbl{font-size:12px;font-weight:600;white-space:nowrap;min-width:32px}.type-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center}.modal-bg.open{display:flex}.modal{background:#fff;border-radius:16px;width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}.modal-head{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between}.modal-head h3{font-size:17px;font-weight:700;color:var(--navy)}.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}.modal-body{padding:20px 24px 24px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.form-full{grid-column:1/-1}.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:.2s}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}.form-group textarea{resize:vertical;min-height:72px}.modal-foot{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end}#toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:.3s}#toast.show{transform:translateY(0);opacity:1}#toast.success{background:var(--green)}#toast.error{background:var(--red)}.search-bar{position:relative;margin-bottom:16px}.search-bar input{width:300px;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:.2s}.search-bar input:focus{border-color:var(--blue)}.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}@keyframes spin{to{transform:rotate(360deg)}}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div id="loginScreen"><div class="login-box"><div class="login-logo">🔐</div><h2>PMO Admin</h2><p>Project Management Dashboard</p><input type="text" id="loginUser" placeholder="Username" value="admin"><input type="password" id="loginPass" placeholder="Password"><button class="login-btn" onclick="doLogin()">Sign In</button><div class="login-error" id="loginError">Incorrect credentials</div></div></div>
<div id="app"><div class="topbar"><div class="topbar-left"><span class="topbar-logo">📊</span><span class="topbar-title">PMO DASHBOARD</span><span class="topbar-badge">ADMIN</span></div><div class="topbar-right"><span><span class="sync-dot"></span><span id="lastSync">Ready</span></span><button onclick="loadData()">↺ Refresh</button><button onclick="logout()">Sign Out</button></div></div><div class="tabs"><button class="tab active" onclick="switchTab('overview')">📊 Overview</button><button class="tab" onclick="switchTab('projects')">📁 Projects</button></div><div class="content"><div class="tab-pane active" id="tab-overview"><div class="kpi-grid" id="kpiCards"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div><div class="tab-pane" id="tab-projects"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div class="type-pills"><span class="pill pill-all active" onclick="filterType('all',this)">All</span><span class="pill pill-content" onclick="filterType('content',this)">📄 Content</span><span class="pill pill-software" onclick="filterType('software',this)">💻 Software</span><span class="pill pill-marketing" onclick="filterType('marketing',this)">📈 Marketing</span><span class="pill pill-initiatives" onclick="filterType('initiatives',this)">🚀 Initiatives</span><span class="pill pill-sales" onclick="filterType('sales',this)">💼 Sales</span></div><button class="btn btn-primary" onclick="openAddModal()">＋ Add Project</button></div><div class="search-bar"><span class="search-icon">🔍</span><input type="text" placeholder="Search..." oninput="searchProjects(this.value)"></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>Project</th><th>Type</th><th>Status</th><th>Phase</th><th>Progress</th><th>Milestone</th><th>Date</th><th>RAG</th><th>Owner</th><th>Public</th><th>Actions</th></tr></thead><tbody id="projectsBody"><tr><td colspan="12" class="loading"><div class="spinner"></div><br>Loading...</td></tr></tbody></table></div></div></div></div>
<div class="modal-bg" id="projectModal"><div class="modal"><div class="modal-head"><h3 id="modalTitle">Add Project</h3><button class="modal-close" onclick="closeModal('projectModal')">✕</button></div><div class="modal-body"><div class="form-grid"><div class="form-group form-full"><label>Project Name *</label><input type="text" id="f_name" placeholder="Enter project name"></div><div class="form-group"><label>Type *</label><select id="f_sheet"><option value="content">📄 Content</option><option value="software">💻 Software</option><option value="marketing">📈 Marketing</option><option value="initiatives">🚀 Initiatives</option><option value="sales">💼 Sales</option></select></div><div class="form-group"><label>Status</label><select id="f_status"><option>Active</option><option>Upcoming</option><option>On Hold</option><option>Completed</option><option>Cancelled</option></select></div><div class="form-group"><label>Phase</label><input type="text" id="f_phase" placeholder="Development"></div><div class="form-group"><label>Progress %</label><input type="number" id="f_progress" min="0" max="100" placeholder="0"></div><div class="form-group"><label>RAG</label><select id="f_rag"><option value="Green">🟢 Green</option><option value="Amber">🟡 Amber</option><option value="Red">🔴 Red</option></select></div><div class="form-group"><label>Next Milestone</label><input type="text" id="f_nextMilestone" placeholder="UAT"></div><div class="form-group"><label>Date</label><input type="date" id="f_milestoneDate"></div><div class="form-group"><label>Owner</label><input type="text" id="f_responsible" placeholder="Name"></div><div class="form-group"><label>Public?</label><select id="f_publicVis"><option value="Yes">Yes - Show on public dashboard</option><option value="No">No - Internal only</option></select></div><div class="form-group form-full"><label>Comment</label><textarea id="f_comment" placeholder="Notes..."></textarea></div></div></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal('projectModal')">Cancel</button><button class="btn btn-primary" onclick="saveProject()">💾 Save</button></div></div></div>
<div id="toast"></div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzAs-c4RP_i1QXcAjADVD5l2If99bAZGub19YLG7d5fjLirBYaA9KCRf8hR3b4SysMRDQ/exec';
const ADMIN_USER='admin';
const ADMIN_PASS='1231';
let allData=null,currentFilter='all',editingProject=null,editingSheet=null;
const TYPE_LABELS={content:'📄 Content',software:'💻 Software',marketing:'📈 Marketing',initiatives:'🚀 Initiatives',sales:'💼 Sales'};
const TYPE_COLORS={content:'#0D7377',software:'#2563A8',marketing:'#6C3483',initiatives:'#E67E22',sales:'#1E7E34'};
const TYPE_BG={content:'#D0F0F0',software:'#EEF4FC',marketing:'#EDE0F5',initiatives:'#FDE8D8',sales:'#D4EDDA'};
function doLogin(){const u=document.getElementById('loginUser').value,p=document.getElementById('loginPass').value;if(u===ADMIN_USER&&p===ADMIN_PASS){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';loadData()}else document.getElementById('loginError').style.display='block'}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function logout(){document.getElementById('app').style.display='none';document.getElementById('loginScreen').style.display='flex'}
async function loadData(){showToast('Syncing...','');try{const res=await fetch(`${SCRIPT_URL}?action=getData`);allData=await res.json();document.getElementById('lastSync').textContent='Synced '+new Date().toLocaleTimeString();renderAll();showToast('✅ Synced','success')}catch(e){showToast('⚠️ Connection error','error');allData=getDemoData();renderAll()}}
function renderAll(){renderKPIs();renderProjects()}
function renderKPIs(){const k=allData.kpis;const cards=[{val:k.total,lbl:'Total',cls:'navy'},{val:k.active,lbl:'Active',cls:'blue'},{val:k.completed,lbl:'Completed',cls:'green'},{val:k.upcoming,lbl:'Upcoming',cls:'teal'},{val:k.onHold,lbl:'On Hold',cls:'gray'},{val:k.escalated,lbl:'Escalated',cls:'red'}];document.getElementById('kpiCards').innerHTML=cards.map(c=>`<div class="kpi-card ${c.cls}"><div class="kpi-val">${c.val}</div><div class="kpi-lbl">${c.lbl}</div></div>`).join('')}
function renderProjects(filter='',typeFilter=null){const type=typeFilter||currentFilter;const search=filter.toLowerCase();let counter=0,rows='';Object.entries(allData.projects).forEach(([key,list])=>{if(type!=='all'&&type!==key)return;list.forEach(p=>{if(search&&!p.name.toLowerCase().includes(search))return;counter++;const pct=Number(p.progress||0);const pctColor=pct<40?'#C0392B':pct<70?'#FFC107':'#1E7E34';rows+=`<tr><td style="color:var(--muted);font-size:12px">${counter}</td><td style="font-weight:600">${p.name}</td><td><span class="type-tag" style="background:${TYPE_BG[key]};color:${TYPE_COLORS[key]}">${TYPE_LABELS[key]}</span></td><td><span class="badge badge-${p.status?.toLowerCase().replace(' ','')}">${p.status||''}</span></td><td style="font-size:12px">${p.phase||''}</td><td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pctColor}"></div></div><span class="prog-lbl" style="color:${pctColor}">${pct}%</span></div></td><td style="font-size:12px">${p.nextMilestone||''}</td><td style="font-size:12px">${p.milestoneDate||''}</td><td><span class="badge badge-${p.rag?.toLowerCase()}">${p.rag||''}</span></td><td style="font-size:12px">${p.responsible||''}</td><td><span class="badge badge-${p.publicVisibility==='Yes'?'green':'no'}">${p.publicVisibility||'No'}</span></td><td><div style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" onclick="openEditModal('${key}','${p.name.replace(/'/g,"\\'")}')">✏️</button><button class="btn btn-danger btn-sm" onclick="deleteProject('${key}','${p.name.replace(/'/g,"\\'")}')">🗑️</button></div></td></tr>`})});document.getElementById('projectsBody').innerHTML=rows||`<tr><td colspan="12" style="text-align:center;padding:32px">No projects</td></tr>`}
function filterType(type,el){currentFilter=type;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderProjects()}
function searchProjects(val){renderProjects(val)}
function openAddModal(){editingProject=null;editingSheet=null;document.getElementById('modalTitle').textContent='＋ Add Project';clearForm();document.getElementById('projectModal').classList.add('open')}
function openEditModal(sheet,name){const project=allData.projects[sheet]?.find(p=>p.name===name);if(!project)return;editingProject=name;editingSheet=sheet;document.getElementById('modalTitle').textContent='✏️ Edit';document.getElementById('f_name').value=project.name||'';document.getElementById('f_sheet').value=sheet;document.getElementById('f_status').value=project.status||'Active';document.getElementById('f_phase').value=project.phase||'';document.getElementById('f_progress').value=project.progress||'';document.getElementById('f_rag').value=project.rag||'Green';document.getElementById('f_nextMilestone').value=project.nextMilestone||'';document.getElementById('f_milestoneDate').value='';document.getElementById('f_responsible').value=project.responsible||'';document.getElementById('f_publicVis').value=project.publicVisibility||'No';document.getElementById('f_comment').value=project.comment||'';document.getElementById('projectModal').classList.add('open')}
function clearForm(){['f_name','f_phase','f_progress','f_nextMilestone','f_milestoneDate','f_responsible','f_comment'].forEach(id=>document.getElementById(id).value='');document.getElementById('f_status').value='Active';document.getElementById('f_rag').value='Green';document.getElementById('f_publicVis').value='No'}
async function saveProject(){const name=document.getElementById('f_name').value.trim();if(!name){showToast('Name required','error');return}const data={name,status:document.getElementById('f_status').value,phase:document.getElementById('f_phase').value,progress:document.getElementById('f_progress').value,rag:document.getElementById('f_rag').value,nextMilestone:document.getElementById('f_nextMilestone').value,milestoneDate:document.getElementById('f_milestoneDate').value,responsible:document.getElementById('f_responsible').value,publicVisibility:document.getElementById('f_publicVis').value,comment:document.getElementById('f_comment').value,escalate:'No'};const sheet=document.getElementById('f_sheet').value;try{const res=await apiPost(editingProject?{action:'updateProject',sheet,originalName:editingProject,data,password:ADMIN_PASS}:{action:'addProject',sheet,data,password:ADMIN_PASS});if(res.success){showToast('✅ Saved','success');closeModal('projectModal');loadData()}else showToast('Error: '+res.error,'error')}catch(e){showToast('⚠️ Saved locally','success');closeModal('projectModal')}}
async function deleteProject(sheet,name){if(!confirm(`Delete "${name}"?`))return;try{const res=await apiPost({action:'deleteProject',sheet,name,password:ADMIN_PASS});if(res.success){showToast('🗑️ Deleted','success');loadData()}else showToast('Error: '+res.error,'error')}catch(e){showToast('⚠️ Error','error')}}
function switchTab(name){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));event.target.classList.add('active');document.getElementById('tab-'+name).classList.add('active')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
async function apiPost(body){const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(body)});return await res.json()}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>{t.className=''},3000)}
function getDemoData(){const p=(name,status,phase,progress,milestone,date,rag,responsible,pubVis='No')=>({name,status,phase,progress,nextMilestone:milestone,milestoneDate:date,rag,responsible,publicVisibility:pubVis,comment:'',escalate:'No'});const projects={content:[p('Website Redesign','Active','Design',65,'Launch','15-Jun-25','Green','Sarah K.','Yes')],software:[p('CRM v2','Active','Dev',70,'UAT','25-Jun-25','Green','Rami S.','Yes')],marketing:[p('Q3 Campaign','Active','Exec',60,'Assets','28-Jun-25','Green','Omar B.','Yes')],initiatives:[p('Digital Transformation','Active','Phase 2',55,'Committee','16-Jun-25','Amber','Mark T.','No')],sales:[p('Sales Playbook','Active','Draft',50,'Review','20-Jun-25','Green','Nour A.','Yes')]};const kpis={total:5,active:5,completed:0,upcoming:0,onHold:0,escalated:0,green:4,amber:1,red:0,avgProgress:62};return{projects,resources:[],kpis}}
</script>
</body>
</html>
