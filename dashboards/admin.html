<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Admin Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
  :root {--navy:#0F1E35;--blue:#1A5FCC;--gold:#E8A838;--green:#16A34A;--red:#DC2626;--bg:#F7F9FC;--border:#E2E8F0;--text:#0F1E35;}
  body {font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);margin:0;}
  .topbar {background:var(--navy);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;}
  .layout {display:flex;height:calc(100vh - 56px);}
  .sidebar {width:220px;background:#1B2E4A;color:#8BAAC4;padding:20px 0;}
  .sidebar-item {padding:10px 20px;cursor:pointer;}
  .sidebar-item:hover, .sidebar-item.active {background:rgba(255,255,255,.1);color:#fff;}
  .main {flex:1;padding:24px;overflow-y:auto;}
  .stats-row {display:flex;gap:16px;margin-bottom:24px;}
  .stat-card {flex:1;background:#fff;padding:20px;border-radius:8px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .stat-card h3 {margin:0 0 10px;font-size:12px;color:#64748B;text-transform:uppercase;}
  .stat-card .val {font-size:28px;font-weight:700;}
  .card {background:#fff;border-radius:8px;border:1px solid var(--border);padding:20px;margin-bottom:20px;}
  .btn {background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;}
  .login-overlay {position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;}
  .login-box {background:#fff;padding:40px;border-radius:12px;width:320px;text-align:center;}
  table {width:100%;border-collapse:collapse;} th,td {padding:12px;text-align:left;border-bottom:1px solid var(--border);}
  .modal {position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;}
  .modal.open {display:flex;}
  .modal-content {background:#fff;padding:24px;border-radius:8px;width:500px;max-width:90%;}
  .form-group {margin-bottom:16px;} .form-group label {display:block;margin-bottom:6px;font-weight:600;font-size:12px;}
  .form-group input, .form-group select {width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;}
</style>
</head>
<body>

<div class="login-overlay" id="adminLogin">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="password" id="admin-pass" placeholder="Password" style="width:100%;padding:10px;margin:20px 0;">
    <button class="btn" style="width:100%" onclick="doLogin()">Login</button>
  </div>
</div>

<div class="topbar" id="topbar" style="display:none">
  <h2>PMO Admin</h2><button class="btn" style="background:transparent;border:1px solid #fff" onclick="location.reload()">Logout</button>
</div>

<div class="layout" id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-item active" onclick="switchTab('projects')">📊 Projects</div>
    <div class="sidebar-item" onclick="switchTab('team')">👥 Team Members</div>
  </div>
  
  <div class="main">
    <div id="tab-projects">
      <div class="stats-row">
        <div class="stat-card"><h3>Total Projects</h3><div class="val" id="k-total">0</div></div>
        <div class="stat-card"><h3>Active</h3><div class="val" id="k-active" style="color:var(--blue)">0</div></div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:16px">
          <h2>All Projects</h2><button class="btn" onclick="openModal()">+ Add Project</button>
        </div>
        <table>
          <thead><tr><th>Name</th><th>Status</th><th>RAG</th><th>Owner</th><th>Actions</th></tr></thead>
          <tbody id="proj-body"></tbody>
        </table>
      </div>
    </div>
    
    <div id="tab-team" style="display:none">
      <div class="card">
        <h2>Team Members</h2>
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th></tr></thead>
          <tbody id="team-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="projModal">
  <div class="modal-content">
    <h3 style="margin-top:0">Project Editor</h3>
    <div class="form-group"><label>Name</label><input type="text" id="p_name"></div>
    <div class="form-group"><label>Status</label><select id="p_status"><option>Active</option><option>Completed</option></select></div>
    <div class="form-group"><label>RAG</label><select id="p_rag"><option>Green</option><option>Amber</option><option>Red</option></select></div>
    <div style="text-align:right;margin-top:20px;">
      <button class="btn" style="background:#fff;color:#000;border:1px solid #ccc" onclick="document.getElementById('projModal').classList.remove('open')">Cancel</button>
      <button class="btn" onclick="saveProj()">Save</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ygrfxvsmdadxmanaqjka.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncmZ4dnNtZGFkeG1hbmFxamthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTYzMDAsImV4cCI6MjA5NTAzMjMwMH0.B3dw5L6kRIOg72qV_-wyDmLX3Pukdxsqe587XkuGzhw';
  const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

  let allProjects = [];
  let editingId = null;

  function doLogin() {
    if(document.getElementById('admin-pass').value === '1231') {
      document.getElementById('adminLogin').style.display = 'none';
      document.getElementById('topbar').style.display = 'flex';
      document.getElementById('app').style.display = 'flex';
      loadProjects();
      loadTeam();
    } else { alert("Incorrect password"); }
  }

  function switchTab(tab) {
    document.getElementById('tab-projects').style.display = tab === 'projects' ? 'block' : 'none';
    document.getElementById('tab-team').style.display = tab === 'team' ? 'block' : 'none';
  }

  async function loadProjects() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=*`, { headers: HEADERS });
    allProjects = await res.json();
    document.getElementById('k-total').textContent = allProjects.length;
    document.getElementById('k-active').textContent = allProjects.filter(p=>p.status==='Active').length;
    
    document.getElementById('proj-body').innerHTML = allProjects.map(p => `
      <tr>
        <td><strong>${p.project_name}</strong></td><td>${p.status}</td><td>${p.rag}</td><td>${p.responsible||'—'}</td>
        <td>
          <button class="btn" style="padding:4px 8px;font-size:11px" onclick="editProj('${p.id}')">Edit</button>
          <button class="btn" style="padding:4px 8px;font-size:11px;background:var(--red)" onclick="delProj('${p.id}')">Del</button>
        </td>
      </tr>
    `).join('');
  }

  async function loadTeam() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?select=*`, { headers: HEADERS });
    const users = await res.json();
    document.getElementById('team-body').innerHTML = users.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td></tr>`).join('');
  }

  function openModal() {
    editingId = null; document.getElementById('p_name').value = '';
    document.getElementById('projModal').classList.add('open');
  }

  function editProj(id) {
    const p = allProjects.find(x => x.id === id);
    if(!p) return;
    editingId = id;
    document.getElementById('p_name').value = p.project_name;
    document.getElementById('p_status').value = p.status;
    document.getElementById('p_rag').value = p.rag;
    document.getElementById('projModal').classList.add('open');
  }

  async function saveProj() {
    const data = { project_name: document.getElementById('p_name').value, status: document.getElementById('p_status').value, rag: document.getElementById('p_rag').value, category: 'Software Projects' };
    const method = editingId ? 'PATCH' : 'POST';
    const url = editingId ? `projects?id=eq.${editingId}` : 'projects';
    await fetch(`${SUPABASE_URL}/rest/v1/${url}`, { method, headers: HEADERS, body: JSON.stringify(data) });
    document.getElementById('projModal').classList.remove('open');
    loadProjects();
  }

  async function delProj(id) {
    if(confirm("Delete project?")) {
      await fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
      loadProjects();
    }
  }
</script>
</body>
</html>
