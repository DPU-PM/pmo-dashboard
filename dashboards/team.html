<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Team Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --navy:#0F1E35;--navy2:#1B2E4A;--blue:#1A5FCC;--blue-light:#2E7DE9;
    --gold:#E8A838;--green:#16A34A;--green-bg:#DCFCE7;
    --amber:#D97706;--amber-bg:#FEF3C7;--red:#DC2626;--red-bg:#FEE2E2;
    --text:#0F1E35;--text-muted:#64748B;--border:#E2E8F0;
    --bg:#F7F9FC;--white:#FFFFFF;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
    --radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

  /* TOPBAR */
  .topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .topbar-brand{display:flex;align-items:center;gap:10px;}
  .topbar-brand .logo{width:32px;height:32px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--navy);}
  .topbar-brand span{font-weight:600;font-size:16px;}
  .topbar-brand small{font-size:11px;color:#8BAAC4;margin-left:8px;}
  .last-updated{font-size:11px;color:#8BAAC4;}

  /* MAIN */
  .main{padding:24px;max-width:1400px;margin:0 auto;}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .stat-card .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
  .stat-card .value{font-size:26px;font-weight:700;color:var(--navy);font-family:'IBM Plex Mono',monospace;}
  .stat-card .sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .stat-card.green .value{color:var(--green);}
  .stat-card.amber .value{color:var(--amber);}
  .stat-card.blue .value{color:var(--blue);}

  /* SECTION HEADER */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-header h2{font-size:16px;font-weight:600;}

  /* FILTER BAR */
  .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text-muted);transition:all .15s;}
  .pill:hover{border-color:var(--blue);color:var(--blue);}
  .pill.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .search-input{margin-left:auto;padding:6px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;font-family:inherit;outline:none;width:220px;}
  .search-input:focus{border-color:var(--blue);}

  /* CARD */
  .card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}

  /* PROJECT CARDS GRID */
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px;}
  .project-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .project-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.12);transform:translateY(-2px);}
  .project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .project-card.green::before{background:var(--green);}
  .project-card.amber::before{background:var(--amber);}
  .project-card.red::before{background:var(--red);}
  .project-card.blue::before{background:var(--blue);}
  .pc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
  .pc-name{font-weight:700;font-size:15px;color:var(--navy);line-height:1.3;}
  .pc-type{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;border:1px solid;margin-top:4px;display:inline-block;}
  .type-content{color:#0D7377;background:#E6F9F9;border-color:#A7D9DA;}
  .type-software{color:#1A5FCC;background:#DBEAFE;border-color:#93C5FD;}
  .type-marketing{color:#6C3483;background:#F3E8FF;border-color:#C4B5FD;}
  .type-initiatives{color:#C2410C;background:#FEF3C7;border-color:#FCD34D;}
  .type-sales{color:#15803D;background:#DCFCE7;border-color:#86EFAC;}
  .pc-progress{margin-bottom:12px;}
  .pc-prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
  .pc-prog-label span{color:var(--text-muted);}
  .pc-prog-label strong{color:var(--text);font-family:'IBM Plex Mono',monospace;}
  .prog-bar{height:7px;background:#E2E8F0;border-radius:4px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--blue-light));transition:width .4s;}
  .prog-fill.done{background:linear-gradient(90deg,var(--green),#22C55E);}
  .prog-fill.warn{background:linear-gradient(90deg,var(--amber),var(--gold));}
  .pc-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-muted);}
  .rag-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
  .rag-dot.green{background:var(--green);}
  .rag-dot.amber{background:var(--amber);}
  .rag-dot.red{background:var(--red);}
  .pc-tasks{font-size:11px;background:#EFF6FF;color:var(--blue);padding:2px 7px;border-radius:10px;font-weight:600;}
  .pc-owner{display:flex;align-items:center;gap:6px;}
  .owner-avatar{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  /* TASK EXPAND PANEL */
  .task-panel{display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}
  .task-panel.open{display:block;}
  .task-phase{margin-bottom:10px;}
  .task-phase-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:6px;}
  .task-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F8FAFC;font-size:12px;}
  .task-row:last-child{border-bottom:none;}
  .task-name{flex:1;font-weight:500;}
  .task-owner{color:var(--text-muted);width:70px;text-align:right;}
  .task-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;width:32px;text-align:right;}
  .task-rag{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .task-dep{font-size:10px;background:#EFF6FF;color:var(--blue);padding:1px 5px;border-radius:8px;}
  .expand-btn{background:none;border:none;font-size:11px;color:var(--blue);cursor:pointer;padding:0;font-family:inherit;margin-top:10px;}

  /* RESOURCES SECTION */
  .resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:20px;}
  .resource-card{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:10px;}
  .resource-avatar{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .resource-info .name{font-weight:600;font-size:13px;}
  .resource-info .role{font-size:11px;color:var(--text-muted);}

  /* LOADING */
  .loading-wrap{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text-muted);}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-right:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* EMPTY */
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
  .empty-state .icon{font-size:40px;margin-bottom:10px;opacity:.4;}

  /* STATUS BADGE */
  .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;}
  .badge-blue{background:#DBEAFE;color:#1D4ED8;}
  .badge-green{background:var(--green-bg);color:var(--green);}
  .badge-amber{background:var(--amber-bg);color:var(--amber);}
  .badge-gray{background:#F1F5F9;color:#64748B;}
  .badge-purple{background:#F3E8FF;color:#7C3AED;}

  @media(max-width:768px){
    .stats-row{grid-template-columns:repeat(3,1fr);}
    .projects-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="logo">PMO</div>
    <span>Team Dashboard</span>
    <small>Read-only view</small>
  </div>
  <span class="last-updated" id="last-updated">Loading...</span>
</div>

<div class="main">

  <!-- KPIs -->
  <div class="stats-row">
    <div class="stat-card blue"><div class="label">Total Projects</div><div class="value" id="k-total">—</div><div class="sub">All categories</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value" id="k-active">—</div><div class="sub">In progress</div></div>
    <div class="stat-card green"><div class="label">Completed</div><div class="value" id="k-completed">—</div><div class="sub">Delivered</div></div>
    <div class="stat-card amber"><div class="label">At Risk</div><div class="value" id="k-risk">—</div><div class="sub">Amber + Red</div></div>
    <div class="stat-card"><div class="label">Avg Progress</div><div class="value" id="k-avg">—</div><div class="sub">All projects</div></div>
    <div class="stat-card"><div class="label">Team</div><div class="value" id="k-team">—</div><div class="sub">Members</div></div>
  </div>

  <!-- PROJECTS -->
  <div class="section-header">
    <h2>📊 All Projects</h2>
  </div>

  <div class="filter-bar">
    <span class="pill active" onclick="filterType('all',this)">All</span>
    <span class="pill" onclick="filterType('Content Projects',this)">Content</span>
    <span class="pill" onclick="filterType('Software Projects',this)">Software</span>
    <span class="pill" onclick="filterType('Marketing & Growth',this)">Marketing</span>
    <span class="pill" onclick="filterType('Initiatives',this)">Initiatives</span>
    <span class="pill" onclick="filterType('Sales Projects',this)">Sales</span>
    <input class="search-input" type="text" placeholder="🔍 Search projects..." oninput="searchProjects(this.value)">
  </div>

  <div id="projects-container">
    <div class="loading-wrap"><div class="spinner"></div> Loading projects...</div>
  </div>

  <!-- TEAM -->
  <div class="section-header" style="margin-top:8px">
    <h2>👥 Team Members</h2>
  </div>
  <div class="card">
    <div class="resource-grid" id="resource-grid">
      <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div> Loading...</div>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMy2NyWPM16Fj7pKwi1rs9yRO1J7u-NMiS_sHtK-3zMXhCW4_Xe5XJgLivwCm1ro39mA/exec';

let allData = {};
let allResources = [];
let currentFilter = 'all';
let currentSearch = '';

// JSONP
function apiFetch(url) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Date.now() + Math.floor(Math.random()*9999);
    const s = document.createElement('script');
    const t = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    window[cb] = (d) => { cleanup(); resolve(d); };
    function cleanup() { clearTimeout(t); delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    s.onerror = () => { cleanup(); reject(new Error('Failed')); };
    s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    document.head.appendChild(s);
  });
}

window.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
  try {
    const data = await apiFetch(`${SCRIPT_URL}?action=getData`);
    allData = data.projects || {};
    allResources = data.resources || [];
    renderKPIs(data.kpis || {});
    renderProjects();
    renderResources();
    document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('projects-container').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Failed to load data. <a href="javascript:loadData()" style="color:var(--blue)">Retry</a></p></div>`;
  }
}

function renderKPIs(k) {
  const all = getAllProjects();
  document.getElementById('k-total').textContent = all.length;
  document.getElementById('k-active').textContent = all.filter(p=>p.status==='Active').length;
  document.getElementById('k-completed').textContent = all.filter(p=>p.status==='Completed').length;
  document.getElementById('k-risk').textContent = all.filter(p=>p.rag==='Amber'||p.rag==='Red').length;
  const avg = all.length ? Math.round(all.reduce((s,p)=>s+(parseInt(p.progress)||0),0)/all.length) : 0;
  document.getElementById('k-avg').textContent = avg + '%';
  document.getElementById('k-team').textContent = allResources.length;
}

function getAllProjects() {
  const arr = [];
  for(const [sheet, list] of Object.entries(allData)) {
    (list||[]).forEach(p => arr.push({...p, sheetName: sheet}));
  }
  return arr;
}

function filterType(type, el) {
  currentFilter = type;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderProjects();
}

function searchProjects(val) { currentSearch = val.toLowerCase(); renderProjects(); }

function renderProjects() {
  let all = getAllProjects();
  if(currentFilter !== 'all') all = all.filter(p=>p.sheetName===currentFilter);
  if(currentSearch) all = all.filter(p=>
    (p.projectName||'').toLowerCase().includes(currentSearch) ||
    (p.responsible||'').toLowerCase().includes(currentSearch)
  );

  const container = document.getElementById('projects-container');
  if(!all.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No projects found</p></div>`;
    return;
  }

  container.innerHTML = `<div class="projects-grid">${all.map(p => projectCard(p)).join('')}</div>`;
}

function projectCard(p) {
  const pct = parseInt(p.progress)||0;
  const rag = (p.rag||'Green').toLowerCase();
  const tasks = (p.tasks||[]).filter(t=>t.taskType==='task');
  const typeClass = typeCSS(p.sheetName);
  const typeShort = {'Content Projects':'Content','Software Projects':'Software','Marketing & Growth':'Marketing','Initiatives':'Initiatives','Sales Projects':'Sales'}[p.sheetName]||p.sheetName;
  const statusBadge = {'Active':'badge-blue','Completed':'badge-green','On Hold':'badge-gray','Upcoming':'badge-purple'}[p.status]||'badge-gray';

  // Build task rows by phase
  const phases = {};
  tasks.forEach(t => {
    const ph = t.phase||'General';
    if(!phases[ph]) phases[ph]=[];
    phases[ph].push(t);
  });
  const taskHTML = Object.entries(phases).map(([ph,ts]) => `
    <div class="task-phase">
      <div class="task-phase-label">📂 ${esc(ph)}</div>
      ${ts.map(t=>`
        <div class="task-row">
          <span class="task-rag rag-dot ${(t.rag||'Green').toLowerCase()}"></span>
          <span class="task-name">${esc(t.taskName||'')}</span>
          ${t.dependsOn?`<span class="task-dep">↳${esc(t.dependsOn.substring(0,10))}</span>`:''}
          <span class="task-owner">${esc(t.responsible||'')}</span>
          <span class="task-pct">${t.progress||0}%</span>
        </div>`).join('')}
    </div>`).join('');

  const cardId = 'card-' + Math.random().toString(36).substr(2,8);

  return `<div class="project-card ${rag}" id="${cardId}">
    <div class="pc-header">
      <div>
        <div class="pc-name">${esc(p.projectName)}</div>
        <span class="pc-type ${typeClass}">${typeShort}</span>
      </div>
      <span class="badge ${statusBadge}">${esc(p.status||'Active')}</span>
    </div>
    <div class="pc-progress">
      <div class="pc-prog-label"><span>Progress</span><strong>${pct}%</strong></div>
      <div class="prog-bar"><div class="prog-fill ${pct>=100?'done':pct<30?'warn':''}" style="width:${pct}%"></div></div>
    </div>
    <div class="pc-meta">
      <span><span class="rag-dot ${rag}"></span>${esc(p.rag||'Green')}</span>
      ${tasks.length?`<span class="pc-tasks">📋 ${tasks.length} tasks</span>`:''}
      ${p.milestoneDate?`<span>📅 ${esc(p.milestoneDate)}</span>`:''}
      <span class="pc-owner"><span class="owner-avatar">${initials(p.responsible)}</span>${esc(p.responsible||'—')}</span>
    </div>
    ${tasks.length?`
      <button class="expand-btn" onclick="toggleTasks('${cardId}')">▶ Show tasks</button>
      <div class="task-panel" id="panel-${cardId}">${taskHTML}</div>
    `:''}
  </div>`;
}

function toggleTasks(cardId) {
  const panel = document.getElementById('panel-'+cardId);
  const btn = document.querySelector(`#${cardId} .expand-btn`);
  const open = panel.classList.toggle('open');
  btn.textContent = (open ? '▼ Hide' : '▶ Show') + ' tasks';
}

function renderResources() {
  const grid = document.getElementById('resource-grid');
  if(!allResources.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">👥</div><p>No team members</p></div>`;
    return;
  }
  const colors=['#1A5FCC','#16A34A','#D97706','#7C3AED','#DC2626','#0D7377'];
  grid.innerHTML = allResources.map((r,i)=>`
    <div class="resource-card">
      <div class="resource-avatar" style="background:${colors[i%colors.length]}">${initials(r.name)}</div>
      <div class="resource-info"><div class="name">${esc(r.name)}</div><div class="role">${esc(r.role||'—')}</div></div>
    </div>`).join('');
}

function typeCSS(s) {
  return {'Content Projects':'type-content','Software Projects':'type-software','Marketing & Growth':'type-marketing','Initiatives':'type-initiatives','Sales Projects':'type-sales'}[s]||'';
}
function initials(n){return(n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
</body>
</html>
