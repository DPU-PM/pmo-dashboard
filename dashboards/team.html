<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Team Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {--navy:#0F1E35;--blue:#1A5FCC;--blue-light:#2E7DE9;--gold:#E8A838;--green:#16A34A;--amber:#D97706;--red:#DC2626;--red-bg:#FEE2E2;--text:#0F1E35;--text-muted:#64748B;--border:#E2E8F0;--bg:#F7F9FC;--white:#FFFFFF;--shadow:0 1px 3px rgba(0,0,0,.08);--radius:8px;--radius-lg:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
  .login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy) 0%,#1B3A6B 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
  .login-box{background:var(--white);border-radius:var(--radius-lg);padding:40px;width:100%;max-width:380px;box-shadow:0 10px 30px rgba(0,0,0,.2);}
  .form-field{margin-bottom:14px;} .form-field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
  .form-field input{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;outline:none;}
  .login-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;}
  .topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;}
  .main{padding:24px;max-width:1400px;margin:0 auto;}
  .stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--white);border-radius:var(--radius);padding:16px;border:1px solid var(--border);}
  .stat-card .value{font-size:26px;font-weight:700;color:var(--navy);font-family:'IBM Plex Mono',monospace;}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
  .project-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);border-top:4px solid var(--blue);}
  .project-card.rag-green{border-top-color:var(--green);} .project-card.rag-amber{border-top-color:var(--amber);} .project-card.rag-red{border-top-color:var(--red);}
  .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;background:var(--blue);color:#fff;}
  .btn-secondary{background:var(--white);color:var(--text);border:1px solid var(--border);}
  .prog-bar{height:7px;background:#E2E8F0;border-radius:4px;overflow:hidden;margin-top:6px;}
  .prog-fill{height:100%;background:var(--blue);}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:12px 18px;border-radius:var(--radius);z-index:9999;}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-start;justify-content:center;padding:32px;z-index:1000;}
  .modal-overlay.open{display:flex;}
  .adv-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:800px;overflow:hidden;}
  .modal-body{padding:24px;max-height:70vh;overflow-y:auto;}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2 style="text-align:center;margin-bottom:20px">Team Login</h2>
    <div class="form-field"><label>Email</label><input type="email" id="l-email"></div>
    <div class="form-field"><label>Password</label><input type="password" id="l-pass" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div class="topbar" id="mainTopbar" style="display:none">
  <div style="font-weight:700">PMO Team Dashboard</div>
  <div style="display:flex;gap:10px;align-items:center;">
    <span id="u-name"></span>
    <button class="btn btn-secondary" style="padding:4px 8px;font-size:11px" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="main" id="mainApp" style="display:none">
  <div class="stats-row">
    <div class="stat-card"><div class="label">Total</div><div class="value" id="k-total">—</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value" id="k-active">—</div></div>
    <div class="stat-card"><div class="label">Completed</div><div class="value" id="k-completed">—</div></div>
  </div>
  <div style="margin-bottom:16px;display:flex;justify-content:space-between">
    <h2>Projects</h2>
    <button class="btn" id="add-btn" onclick="openAddModal()" style="display:none">＋ Add Project</button>
  </div>
  <div id="projects-container" class="projects-grid"></div>
</div>

<div class="modal-overlay" id="projectModal">
  <div class="adv-modal">
    <div style="background:var(--navy);color:#fff;padding:16px;display:flex;justify-content:space-between;">
      <h3 id="modal-title">Project</h3><button onclick="closeModal()" style="background:none;border:none;color:#fff;cursor:pointer">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-field"><label>Name</label><input type="text" id="p_name"></div>
        <div class="form-field"><label>Category</label><select id="p_type"><option value="software">Software Projects</option><option value="content">Content Projects</option></select></div>
        <div class="form-field"><label>Status</label><select id="p_status"><option>Active</option><option>Completed</option></select></div>
        <div class="form-field"><label>RAG</label><select id="p_rag"><option>Green</option><option>Amber</option><option>Red</option></select></div>
      </div>
    </div>
    <div style="padding:16px;border-top:1px solid var(--border);text-align:right">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveProject()">Save</button>
    </div>
  </div>
</div>

<script>
  let currentUser = null; let allData = {}; let editingProject = null;
  const SUPABASE_URL = 'https://ygrfxvsmdadxmanaqjka.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncmZ4dnNtZGFkeG1hbmFxamthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTYzMDAsImV4cCI6MjA5NTAzMjMwMH0.B3dw5L6kRIOg72qV_-wyDmLX3Pukdxsqe587XkuGzhw';
  const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

  async function sbFetch(path, opts={}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { ...opts, headers: SB_HEADERS });
    return res.ok ? await res.json() : [];
  }

  function doLogin() {
    // Demo bypass for rapid testing or check LocalStorage
    const users = JSON.parse(localStorage.getItem('pmo_team_members')||'[]');
    const email = document.getElementById('l-email').value.toLowerCase();
    const u = users.find(x => x.email === email) || {name:'Team User', permissions:{addProjects:true,editProjects:true}};
    currentUser = u;
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainTopbar').style.display='flex';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('u-name').textContent = u.name;
    if(u.permissions.addProjects) document.getElementById('add-btn').style.display='inline-flex';
    loadData();
  }

  function doLogout() { location.reload(); }

  async function loadData() {
    const projs = await sbFetch('projects?select=*');
    allData = projs;
    document.getElementById('k-total').textContent = projs.length;
    document.getElementById('k-active').textContent = projs.filter(p=>p.status==='Active').length;
    document.getElementById('k-completed').textContent = projs.filter(p=>p.status==='Completed').length;
    
    document.getElementById('projects-container').innerHTML = projs.map(p => `
      <div class="project-card rag-${(p.rag||'green').toLowerCase()}" onclick="openEditModal('${p.id}')">
        <h4>${p.project_name}</h4>
        <div style="font-size:12px;color:var(--text-muted);margin:8px 0">${p.category} · ${p.status}</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${p.progress}%"></div></div>
      </div>
    `).join('');
  }

  function openAddModal() {
    editingProject = null;
    document.getElementById('p_name').value = '';
    document.getElementById('projectModal').classList.add('open');
  }

  function openEditModal(id) {
    const p = allData.find(x => x.id === id);
    if(!p) return;
    editingProject = p;
    document.getElementById('p_name').value = p.project_name;
    document.getElementById('p_status').value = p.status;
    document.getElementById('p_rag').value = p.rag;
    document.getElementById('projectModal').classList.add('open');
  }

  function closeModal() { document.getElementById('projectModal').classList.remove('open'); }

  async function saveProject() {
    const name = document.getElementById('p_name').value;
    if(!name) return;
    const data = { project_name: name, status: document.getElementById('p_status').value, rag: document.getElementById('p_rag').value, category: document.getElementById('p_type').value };
    
    if(editingProject) {
      await sbFetch(`projects?id=eq.${editingProject.id}`, { method: 'PATCH', body: JSON.stringify(data) });
    } else {
      await sbFetch(`projects`, { method: 'POST', body: JSON.stringify(data) });
    }
    closeModal();
    loadData();
  }
</script>
</body>
</html>
