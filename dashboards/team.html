<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Team Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --navy:#0F1E35;--navy2:#1B2E4A;--blue:#1A5FCC;--blue-light:#2E7DE9;
    --gold:#E8A838;--green:#16A34A;--green-bg:#DCFCE7;
    --amber:#D97706;--amber-bg:#FEF3C7;--red:#DC2626;--red-bg:#FEE2E2;
    --text:#0F1E35;--text-muted:#64748B;--border:#E2E8F0;
    --bg:#F7F9FC;--white:#FFFFFF;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
    --shadow-lg:0 8px 32px rgba(0,0,0,.16);
    --radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

  /* ── LOGIN ── */
  .login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy) 0%,#1B3A6B 100%);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .login-box{background:var(--white);border-radius:var(--radius-lg);padding:40px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);}
  .login-logo{width:48px;height:48px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:var(--navy);margin:0 auto 16px;}
  .login-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px;}
  .login-sub{text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:28px;}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .form-group input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
  .form-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,204,.1);}
  .login-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:8px;}
  .login-btn:hover{background:var(--blue-light);}
  .login-error{background:var(--red-bg);color:var(--red);border:1px solid #FECACA;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}

  /* ── TOPBAR ── */
  .topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .topbar-brand{display:flex;align-items:center;gap:10px;}
  .topbar-brand .logo{width:32px;height:32px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--navy);}
  .topbar-brand span{font-weight:600;font-size:16px;}
  .topbar-brand small{font-size:11px;color:#8BAAC4;margin-left:8px;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:6px;padding:6px 12px;}
  .user-avatar{width:26px;height:26px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--navy);}
  .user-chip span{font-size:12px;color:#C8DDF0;}
  .perm-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
  .perm-badge.editor{background:rgba(22,163,74,.25);color:#4ADE80;}
  .perm-badge.viewer{background:rgba(100,116,139,.25);color:#94A3B8;}
  .logout-btn{background:rgba(255,255,255,.1);border:none;color:#C8DDF0;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
  .logout-btn:hover{background:rgba(255,255,255,.2);}
  .last-updated{font-size:11px;color:#8BAAC4;}

  /* ── MAIN ── */
  .main{padding:24px;max-width:1400px;margin:0 auto;}

  /* ── STATS ── */
  .stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .stat-card .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
  .stat-card .value{font-size:26px;font-weight:700;color:var(--navy);font-family:'IBM Plex Mono',monospace;}
  .stat-card.green .value{color:var(--green);}
  .stat-card.amber .value{color:var(--amber);}
  .stat-card.blue .value{color:var(--blue);}

  /* ── SECTION HEADER ── */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-header h2{font-size:16px;font-weight:600;}

  /* ── FILTER BAR ── */
  .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text-muted);transition:all .15s;}
  .pill:hover{border-color:var(--blue);color:var(--blue);}
  .pill.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .search-input{margin-left:auto;padding:6px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;font-family:inherit;outline:none;width:220px;}
  .search-input:focus{border-color:var(--blue);}

  /* ── CARD ── */
  .card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}

  /* ── PROJECT CARDS ── */
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px;}
  .project-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .2s;}
  .project-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);}
  .project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .project-card.rag-green::before{background:var(--green);}
  .project-card.rag-amber::before{background:var(--amber);}
  .project-card.rag-red::before{background:var(--red);}
  .pc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px;}
  .pc-name{font-weight:700;font-size:14px;color:var(--navy);line-height:1.3;}
  .pc-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .pc-type{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;border:1px solid;}
  .type-content{color:#0D7377;background:#E6F9F9;border-color:#A7D9DA;}
  .type-software{color:#1A5FCC;background:#DBEAFE;border-color:#93C5FD;}
  .type-marketing{color:#6C3483;background:#F3E8FF;border-color:#C4B5FD;}
  .type-initiatives{color:#C2410C;background:#FEF3C7;border-color:#FCD34D;}
  .type-sales{color:#15803D;background:#DCFCE7;border-color:#86EFAC;}
  .badge{display:inline-flex;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;}
  .badge-blue{background:#DBEAFE;color:#1D4ED8;}
  .badge-green{background:var(--green-bg);color:var(--green);}
  .badge-amber{background:var(--amber-bg);color:var(--amber);}
  .badge-gray{background:#F1F5F9;color:#64748B;}
  .badge-purple{background:#F3E8FF;color:#7C3AED;}
  .badge-red{background:var(--red-bg);color:var(--red);}
  .pc-progress{margin-bottom:12px;}
  .pc-prog-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
  .pc-prog-row span{color:var(--text-muted);}
  .pc-prog-row strong{font-family:'IBM Plex Mono',monospace;}
  .prog-bar{height:7px;background:#E2E8F0;border-radius:4px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--blue-light));transition:width .4s;}
  .prog-fill.done{background:linear-gradient(90deg,var(--green),#22C55E);}
  .prog-fill.warn{background:linear-gradient(90deg,var(--amber),var(--gold));}
  .pc-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;}
  .rag-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .rag-dot.green{background:var(--green);}
  .rag-dot.amber{background:var(--amber);}
  .rag-dot.red{background:var(--red);}
  .pc-tasks-chip{font-size:11px;background:#EFF6FF;color:var(--blue);padding:2px 7px;border-radius:10px;font-weight:600;}
  .owner-chip{display:flex;align-items:center;gap:5px;}
  .owner-av{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  /* ── EDIT ACTIONS ── */
  .pc-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
  .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:var(--blue-light);}
  .btn-secondary{background:var(--white);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--bg);}
  .btn-sm{padding:5px 10px;font-size:12px;}

  /* ── TASK PANEL ── */
  .expand-btn{background:none;border:none;font-size:11px;color:var(--blue);cursor:pointer;padding:8px 0 0;font-family:inherit;display:block;}
  .task-panel{display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
  .task-panel.open{display:block;}
  .task-phase-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:5px;margin-top:8px;}
  .task-phase-label:first-child{margin-top:0;}
  .task-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F8FAFC;font-size:12px;}
  .task-row:last-child{border-bottom:none;}
  .task-rag{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .task-name{flex:1;font-weight:500;}
  .task-owner{color:var(--text-muted);font-size:11px;text-align:right;width:65px;}
  .task-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;width:30px;text-align:right;}

  /* ── QUICK EDIT MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:560px;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{background:var(--navy);color:#fff;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
  .modal-header h3{font-size:15px;font-weight:600;}
  .close-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .modal-body{padding:22px;}
  .form-grid{display:grid;gap:14px;}
  .form-grid-2{grid-template-columns:1fr 1fr;}
  .form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,204,.1);}
  .form-group textarea{resize:vertical;min-height:64px;}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--border);background:#F8FAFC;border-radius:0 0 var(--radius-lg) var(--radius-lg);}

  /* ── RESOURCES ── */
  .resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:20px;}
  .resource-card{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:10px;}
  .resource-avatar{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .resource-info .name{font-weight:600;font-size:13px;}
  .resource-info .role{font-size:11px;color:var(--text-muted);}

  /* ── TOAST ── */
  #toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
  .toast{padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;color:#fff;box-shadow:var(--shadow-lg);animation:toastIn .2s ease;display:flex;align-items:center;gap:8px;}
  @keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--red);}
  .toast.info{background:var(--blue);}

  /* ── LOADING ── */
  .loading-wrap{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text-muted);}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-right:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
  .empty-state .icon{font-size:40px;margin-bottom:10px;opacity:.4;}

  .hidden{display:none!important;}
  @media(max-width:768px){.stats-row{grid-template-columns:repeat(3,1fr);}.projects-grid{grid-template-columns:1fr;}.form-grid-2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">PMO</div>
    <div class="login-title">Team Login</div>
    <div class="login-sub">Sign in with your team credentials</div>
    <div class="login-error" id="login-error">Invalid email or password</div>
    <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@company.com" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar" id="mainTopbar" style="display:none">
  <div class="topbar-brand">
    <div class="logo">PMO</div>
    <span>Team Dashboard</span>
    <small id="topbar-sub">Team View</small>
  </div>
  <div class="topbar-right">
    <span class="last-updated" id="last-updated"></span>
    <div class="user-chip">
      <div class="user-avatar" id="user-av">?</div>
      <span id="user-name">—</span>
      <span class="perm-badge" id="perm-badge">viewer</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="main" id="mainApp" style="display:none">

  <!-- KPIs -->
  <div class="stats-row">
    <div class="stat-card blue"><div class="label">Total</div><div class="value" id="k-total">—</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value" id="k-active">—</div></div>
    <div class="stat-card green"><div class="label">Completed</div><div class="value" id="k-completed">—</div></div>
    <div class="stat-card amber"><div class="label">At Risk</div><div class="value" id="k-risk">—</div></div>
    <div class="stat-card"><div class="label">Avg Progress</div><div class="value" id="k-avg">—</div></div>
    <div class="stat-card"><div class="label">Team</div><div class="value" id="k-team">—</div></div>
  </div>

  <!-- PROJECTS -->
  <div class="section-header">
    <h2>📊 Projects</h2>
    <button class="btn btn-primary btn-sm" id="add-project-btn" style="display:none" onclick="openAddModal()">＋ Add Project</button>
  </div>
  <div class="filter-bar">
    <span class="pill active" onclick="filterType('all',this)">All</span>
    <span class="pill" onclick="filterType('Content Projects',this)">Content</span>
    <span class="pill" onclick="filterType('Software Projects',this)">Software</span>
    <span class="pill" onclick="filterType('Marketing & Growth',this)">Marketing</span>
    <span class="pill" onclick="filterType('Initiatives',this)">Initiatives</span>
    <span class="pill" onclick="filterType('Sales Projects',this)">Sales</span>
    <input class="search-input" type="text" placeholder="🔍 Search..." oninput="searchProjects(this.value)">
  </div>
  <div id="projects-container"><div class="loading-wrap"><div class="spinner"></div> Loading...</div></div>

  <!-- TEAM -->
  <div class="section-header" style="margin-top:8px"><h2>👥 Team Members</h2></div>
  <div class="card"><div class="resource-grid" id="resource-grid"></div></div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Edit Project</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group" style="grid-column:1/-1">
          <label>Project Name</label>
          <input type="text" id="e_name" />
        </div>
      </div>
      <div class="form-grid form-grid-2" style="margin-top:14px">
        <div class="form-group"><label>Status</label>
          <select id="e_status">
            <option>Active</option><option>On Hold</option>
            <option>Completed</option><option>Upcoming</option><option>Cancelled</option>
          </select>
        </div>
        <div class="form-group"><label>Health (RAG)</label>
          <select id="e_rag">
            <option value="Green">🟢 Green</option>
            <option value="Amber">🟡 Amber</option>
            <option value="Red">🔴 Red</option>
          </select>
        </div>
        <div class="form-group"><label>Owner</label><input type="text" id="e_owner" /></div>
        <div class="form-group"><label>Progress %</label><input type="number" min="0" max="100" id="e_progress" /></div>
        <div class="form-group"><label>Project Type</label>
          <select id="e_type">
            <option value="content">Content Projects</option>
            <option value="software">Software Projects</option>
            <option value="marketing">Marketing &amp; Growth</option>
            <option value="initiatives">Initiatives</option>
            <option value="sales">Sales Projects</option>
          </select>
        </div>
        <div class="form-group"><label>Milestone Date</label><input type="date" id="e_date" /></div>
      </div>
      <div class="form-grid" style="margin-top:14px">
        <div class="form-group"><label>Comment / Notes</label><textarea id="e_comment"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveModal()">💾 Save</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMy2NyWPM16Fj7pKwi1rs9yRO1J7u-NMiS_sHtK-3zMXhCW4_Xe5XJgLivwCm1ro39mA/exec';

// ── TEAM MEMBERS CONFIG ─────────────────────────────────────────
// To add/modify team members, edit this list
// canEdit: true = can edit & add projects | false = view only
const TEAM_MEMBERS = [
  { email: 'meid1137@gmail.com', password: '123', name: 'Eid Member', role: 'Coordinator', canEdit: true, canAdd: true },
  // Add more team members here:
  // { email: 'jane@company.com', password: 'pass123', name: 'Jane Doe', role: 'Developer', canEdit: true, canAdd: false },
  // { email: 'viewer@company.com', password: 'view123', name: 'View Only', role: 'Stakeholder', canEdit: false, canAdd: false },
];
// ────────────────────────────────────────────────────────────────

const SHEETS_MAP = {
  content:'Content Projects', software:'Software Projects',
  marketing:'Marketing & Growth', initiatives:'Initiatives', sales:'Sales Projects'
};
const SHEETS_REVERSE = Object.fromEntries(Object.entries(SHEETS_MAP).map(([k,v])=>[v,k]));

let currentUser = null;
let allData = {};
let allResources = [];
let currentFilter = 'all';
let currentSearch = '';
let editTarget = null; // { sheetKey, projectName }

// ── JSONP ──────────────────────────────────────────────────────
function apiFetch(url) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Date.now() + Math.floor(Math.random()*9999);
    const s = document.createElement('script');
    const t = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    window[cb] = (d) => { cleanup(); resolve(d); };
    function cleanup() { clearTimeout(t); delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    s.onerror = () => { cleanup(); reject(new Error('Script load failed')); };
    s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    document.head.appendChild(s);
  });
}

// ── LOGIN ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('pmo_team_user');
  if (saved) { currentUser = JSON.parse(saved); showApp(); }
});

function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const user = TEAM_MEMBERS.find(u => u.email.toLowerCase() === email && u.password === pass);
  if (!user) {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
    return;
  }
  currentUser = user;
  sessionStorage.setItem('pmo_team_user', JSON.stringify(user));
  showApp();
}

function doLogout() {
  sessionStorage.removeItem('pmo_team_user');
  currentUser = null;
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainTopbar').style.display = 'none';
  document.getElementById('mainApp').style.display = 'none';
}

function showApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainTopbar').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'block';
  // Update UI with user info
  document.getElementById('user-av').textContent = initials(currentUser.name);
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('topbar-sub').textContent = currentUser.role;
  const badge = document.getElementById('perm-badge');
  badge.textContent = currentUser.canEdit ? 'editor' : 'viewer';
  badge.className = 'perm-badge ' + (currentUser.canEdit ? 'editor' : 'viewer');
  // Show add button only if allowed
  document.getElementById('add-project-btn').style.display = currentUser.canAdd ? 'inline-flex' : 'none';
  loadData();
}

// ── DATA ───────────────────────────────────────────────────────
async function loadData() {
  try {
    const data = await apiFetch(`${SCRIPT_URL}?action=getData`);
    allData = data.projects || {};
    allResources = data.resources || [];
    renderKPIs();
    renderProjects();
    renderResources();
    document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch(e) {
    showToast('Failed to load data', 'error');
  }
}

function getAllProjects() {
  const arr = [];
  for(const [key, list] of Object.entries(allData)) {
    const fullName = SHEETS_MAP[key] || key;
    (list||[]).forEach(p => arr.push({...p, sheetName: fullName, sheetKey: key}));
  }
  return arr;
}

function renderKPIs() {
  const all = getAllProjects();
  document.getElementById('k-total').textContent = all.length;
  document.getElementById('k-active').textContent = all.filter(p=>p.status==='Active').length;
  document.getElementById('k-completed').textContent = all.filter(p=>p.status==='Completed').length;
  document.getElementById('k-risk').textContent = all.filter(p=>p.rag==='Amber'||p.rag==='Red').length;
  const avg = all.length ? Math.round(all.reduce((s,p)=>s+(parseInt(p.progress)||0),0)/all.length) : 0;
  document.getElementById('k-avg').textContent = avg+'%';
  document.getElementById('k-team').textContent = allResources.length;
}

function filterType(type, el) {
  currentFilter = type;
  document.querySelectorAll('.filter-bar .pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderProjects();
}

function searchProjects(val) { currentSearch = val.toLowerCase(); renderProjects(); }

function renderProjects() {
  let all = getAllProjects();
  if(currentFilter !== 'all') all = all.filter(p => p.sheetName === currentFilter);
  if(currentSearch) all = all.filter(p =>
    (p.projectName||'').toLowerCase().includes(currentSearch) ||
    (p.responsible||'').toLowerCase().includes(currentSearch)
  );
  const container = document.getElementById('projects-container');
  if(!all.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No projects found</p></div>`;
    return;
  }
  container.innerHTML = `<div class="projects-grid">${all.map(p=>projectCard(p)).join('')}</div>`;
}

function projectCard(p) {
  const pct = parseInt(p.progress)||0;
  const ragCls = (p.rag||'Green').toLowerCase();
  const tasks = (p.tasks||[]).filter(t=>t.taskType==='task');
  const typeClass = {'Content Projects':'type-content','Software Projects':'type-software','Marketing & Growth':'type-marketing','Initiatives':'type-initiatives','Sales Projects':'type-sales'}[p.sheetName]||'';
  const typeShort = {'Content Projects':'Content','Software Projects':'Software','Marketing & Growth':'Marketing','Initiatives':'Initiatives','Sales Projects':'Sales'}[p.sheetName]||p.sheetName;
  const statusBadge = {'Active':'badge-blue','Completed':'badge-green','On Hold':'badge-gray','Upcoming':'badge-purple','Cancelled':'badge-red'}[p.status]||'badge-gray';

  // Tasks grouped by phase
  const phases = {};
  tasks.forEach(t => { const ph=t.phase||'General'; if(!phases[ph])phases[ph]=[]; phases[ph].push(t); });
  const taskHTML = Object.entries(phases).map(([ph,ts])=>`
    <div class="task-phase-label">📂 ${esc(ph)}</div>
    ${ts.map(t=>`<div class="task-row">
      <span class="task-rag rag-dot ${(t.rag||'Green').toLowerCase()}"></span>
      <span class="task-name">${esc(t.taskName||'')}</span>
      <span class="task-owner">${esc(t.responsible||'')}</span>
      <span class="task-pct">${t.progress||0}%</span>
    </div>`).join('')}`).join('');

  const cid = 'pc-'+Math.random().toString(36).substr(2,6);
  const canEdit = currentUser && currentUser.canEdit;

  return `<div class="project-card rag-${ragCls}">
    <div class="pc-header">
      <div>
        <div class="pc-name">${esc(p.projectName)}</div>
      </div>
      <div class="pc-badges">
        <span class="badge ${statusBadge}">${esc(p.status||'Active')}</span>
        <span class="pc-type ${typeClass}">${typeShort}</span>
      </div>
    </div>
    <div class="pc-progress">
      <div class="pc-prog-row"><span>Progress</span><strong>${pct}%</strong></div>
      <div class="prog-bar"><div class="prog-fill ${pct>=100?'done':pct<30?'warn':''}" style="width:${pct}%"></div></div>
    </div>
    <div class="pc-meta">
      <span><span class="rag-dot ${ragCls}"></span> ${esc(p.rag||'Green')}</span>
      ${tasks.length?`<span class="pc-tasks-chip">📋 ${tasks.length} tasks</span>`:''}
      ${p.milestoneDate?`<span>📅 ${esc(p.milestoneDate)}</span>`:''}
      <span class="owner-chip"><span class="owner-av">${initials(p.responsible)}</span>${esc(p.responsible||'—')}</span>
    </div>
    ${tasks.length?`
      <button class="expand-btn" id="ebtn-${cid}" onclick="toggleTasks('${cid}')">▶ Show ${tasks.length} tasks</button>
      <div class="task-panel" id="epanel-${cid}">${taskHTML}</div>
    `:''}
    ${canEdit?`<div class="pc-actions">
      <button class="btn btn-secondary btn-sm" onclick="openEditModal('${esc(p.sheetKey)}','${esc(p.projectName)}')">✏️ Edit</button>
    </div>`:''}
  </div>`;
}

function toggleTasks(cid) {
  const panel = document.getElementById('epanel-'+cid);
  const btn = document.getElementById('ebtn-'+cid);
  const open = panel.classList.toggle('open');
  const count = panel.querySelectorAll('.task-row').length;
  btn.textContent = (open?'▼ Hide':'▶ Show') + ' ' + count + ' tasks';
}

// ── RESOURCES ──────────────────────────────────────────────────
function renderResources() {
  const grid = document.getElementById('resource-grid');
  if(!allResources.length) { grid.innerHTML=`<div class="loading-wrap" style="padding:30px">No team members found</div>`; return; }
  const colors=['#1A5FCC','#16A34A','#D97706','#7C3AED','#DC2626','#0D7377'];
  grid.innerHTML = allResources.map((r,i)=>`
    <div class="resource-card">
      <div class="resource-avatar" style="background:${colors[i%colors.length]}">${initials(r.name)}</div>
      <div class="resource-info"><div class="name">${esc(r.name)}</div><div class="role">${esc(r.role||'—')}</div></div>
    </div>`).join('');
}

// ── EDIT MODAL ─────────────────────────────────────────────────
function openAddModal() {
  editTarget = null;
  document.getElementById('modal-title').textContent = '＋ Add Project';
  document.getElementById('e_name').value = '';
  document.getElementById('e_status').value = 'Active';
  document.getElementById('e_rag').value = 'Green';
  document.getElementById('e_owner').value = currentUser.name;
  document.getElementById('e_progress').value = '0';
  document.getElementById('e_type').value = 'software';
  document.getElementById('e_date').value = '';
  document.getElementById('e_comment').value = '';
  document.getElementById('editModal').classList.add('open');
}

function openEditModal(sheetKey, projectName) {
  const all = getAllProjects();
  const p = all.find(x => x.sheetKey === sheetKey && x.projectName === projectName);
  if(!p) return;
  editTarget = { sheetKey, projectName, tasks: p.tasks || [] };
  document.getElementById('modal-title').textContent = '✏️ Edit: ' + projectName;
  document.getElementById('e_name').value = p.projectName || '';
  document.getElementById('e_status').value = p.status || 'Active';
  document.getElementById('e_rag').value = p.rag || 'Green';
  document.getElementById('e_owner').value = p.responsible || '';
  document.getElementById('e_progress').value = p.progress || '0';
  document.getElementById('e_type').value = sheetKey;
  document.getElementById('e_date').value = p.milestoneDate || '';
  document.getElementById('e_comment').value = p.comment || '';
  document.getElementById('editModal').classList.add('open');
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }

async function saveModal() {
  const name = document.getElementById('e_name').value.trim();
  if(!name) { showToast('Project name required', 'error'); return; }
  const sheetKey = document.getElementById('e_type').value;
  const btn = document.getElementById('modal-save-btn');
  btn.textContent = '⏳ Saving...'; btn.disabled = true;

  const tasks = editTarget?.tasks || [];
  // Update project-level row progress with manual value if no tasks
  const manualProgress = parseInt(document.getElementById('e_progress').value)||0;
  const taskList = tasks.filter(t=>t.taskType!=='project');
  const pct = taskList.length > 0
    ? Math.round(taskList.reduce((s,t)=>s+(parseInt(t.progress)||0),0)/taskList.length)
    : manualProgress;

  // Build project row
  const projectRow = {
    taskName: name, projectName: name, taskType: 'project',
    status: document.getElementById('e_status').value,
    progress: pct,
    rag: document.getElementById('e_rag').value,
    responsible: document.getElementById('e_owner').value.trim(),
    milestoneDate: document.getElementById('e_date').value,
    comment: document.getElementById('e_comment').value.trim(),
    publicVisibility: 'No', phase: document.getElementById('e_status').value
  };
  const allTasks = [projectRow, ...taskList.map(t=>({...t, projectName: name}))];

  const payload = {
    projectName: name,
    originalName: editTarget?.projectName || null,
    sheet: sheetKey,
    originalSheet: editTarget?.sheetKey || null,
    status: projectRow.status,
    progress: pct,
    rag: projectRow.rag,
    responsible: projectRow.responsible,
    publicVisibility: 'No',
    comment: projectRow.comment,
    milestoneDate: projectRow.milestoneDate,
    tasks: allTasks
  };

  const action = editTarget ? 'updateProject' : 'addProject';
  try {
    const url = `${SCRIPT_URL}?action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
    const data = await apiFetch(url);
    if(data.success || data.message) {
      await loadData();
      closeModal();
      showToast(`✅ "${name}" saved`, 'success');
    } else throw new Error(data.error || 'Save failed');
  } catch(e) {
    showToast('Save failed: ' + e.message, 'error');
  } finally {
    btn.textContent = '💾 Save'; btn.disabled = false;
  }
}

// ── HELPERS ────────────────────────────────────────────────────
function initials(n){return(n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  t.className=`toast ${type}`;t.innerHTML=`${icons[type]||''} ${msg}`;
  c.appendChild(t);setTimeout(()=>t.remove(),3500);
}
</script>
