<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Public Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B3A6B;--blue:#2563A8;--green:#1E7E34;--amber:#B8860B;--red:#C0392B;--teal:#0D7377;--purple:#6C3483;--orange:#E67E22;--gray:#6B7A99;--bg:#F0F3F8;--surface:#FFFFFF;--border:#D0D7E2;--text:#1A1A2E;--muted:#6B7A99}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.topbar{background:var(--navy);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}.topbar-left{display:flex;align-items:center;gap:12px}.topbar-logo{font-size:20px}.topbar-title{font-size:16px;font-weight:700;color:#fff}.topbar-badge{background:rgba(34,197,94,.15);color:#22C55E;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid rgba(34,197,94,.3)}.topbar-right{display:flex;align-items:center;gap:16px;color:#fff;font-size:13px}.topbar-right button{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}.topbar-right button:hover{background:rgba(255,255,255,.2)}.sync-dot{width:8px;height:8px;border-radius:50%;background:#1E7E34;display:inline-block;margin-right:6px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px}.tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;font-family:inherit}.tab:hover{color:var(--navy)}.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}.content{padding:24px;max-width:1400px;margin:0 auto}.tab-pane{display:none}.tab-pane.active{display:block}.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}.kpi-card{background:var(--surface);border-radius:12px;padding:16px 20px;border:1px solid var(--border);transition:.2s}.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}.kpi-val{font-size:32px;font-weight:700;line-height:1}.kpi-lbl{font-size:11px;font-weight:600;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}.kpi-card.navy .kpi-val{color:var(--navy)}.kpi-card.blue .kpi-val{color:var(--blue)}.kpi-card.green .kpi-val{color:var(--green)}.kpi-card.teal .kpi-val{color:var(--teal)}.kpi-card.gray .kpi-val{color:var(--gray)}.kpi-card.red .kpi-val{color:var(--red)}.type-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:.2s}.pill.active,.pill:hover{opacity:1}.pill-all{background:#E8EDF5;color:var(--navy);border-color:#D0D7E2}.pill-content{background:#D0F0F0;color:var(--teal);border-color:var(--teal)}.pill-software{background:#EEF4FC;color:var(--blue);border-color:var(--blue)}.pill-marketing{background:#EDE0F5;color:var(--purple);border-color:var(--purple)}.pill-initiatives{background:#FDE8D8;color:var(--orange);border-color:var(--orange)}.pill-sales{background:#D4EDDA;color:var(--green);border-color:var(--green)}.tbl-wrap{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}.tbl{width:100%;border-collapse:collapse;font-size:13px}.tbl th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:#F8FAFC}.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}.badge-active{background:#D6E4F7;color:#2563A8}.badge-completed{background:#D4EDDA;color:#1E7E34}.badge-onhold{background:#FFF3CD;color:#B8860B}.badge-upcoming{background:#D0F0F0;color:#0D7377}.badge-cancelled{background:#F8D7DA;color:#C0392B}.badge-green{background:#D4EDDA;color:#1E7E34}.badge-amber{background:#FFF3CD;color:#B8860B}.badge-red{background:#F8D7DA;color:#C0392B}.prog-wrap{display:flex;align-items:center;gap:8px}.prog-bar{flex:1;height:6px;background:#E8EDF5;border-radius:3px;min-width:60px;overflow:hidden}.prog-fill{height:100%;border-radius:3px;transition:.3s}.prog-lbl{font-size:12px;font-weight:600;white-space:nowrap;min-width:32px}.type-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}.search-bar{position:relative;margin-bottom:16px}.search-bar input{width:300px;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:.2s}.search-bar input:focus{border-color:var(--blue)}.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}@keyframes spin{to{transform:rotate(360deg)}}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}.public-notice{background:#D4EDDA;border-left:4px solid var(--green);padding:12px 16px;margin-bottom:16px;border-radius:8px;font-size:13px;color:var(--green);font-weight:600}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-left"><span class="topbar-logo">🌐</span><span class="topbar-title">PMO DASHBOARD</span><span class="topbar-badge">PUBLIC</span></div><div class="topbar-right"><span><span class="sync-dot"></span><span id="lastSync">Ready</span></span><button onclick="loadData()">↺ Refresh</button></div></div>
<div class="tabs"><button class="tab active" onclick="switchTab('overview')">📊 Overview</button><button class="tab" onclick="switchTab('projects')">📁 Projects</button></div>
<div class="content"><div class="tab-pane active" id="tab-overview"><div class="kpi-grid" id="kpiCards"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div><div class="tab-pane" id="tab-projects"><div class="public-notice">🌐 Public View - Showing approved projects only</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div class="type-pills"><span class="pill pill-all active" onclick="filterType('all',this)">All</span><span class="pill pill-content" onclick="filterType('content',this)">📄 Content</span><span class="pill pill-software" onclick="filterType('software',this)">💻 Software</span><span class="pill pill-marketing" onclick="filterType('marketing',this)">📈 Marketing</span><span class="pill pill-initiatives" onclick="filterType('initiatives',this)">🚀 Initiatives</span><span class="pill pill-sales" onclick="filterType('sales',this)">💼 Sales</span></div></div><div class="search-bar"><span class="search-icon">🔍</span><input type="text" placeholder="Search..." oninput="searchProjects(this.value)"></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>Project</th><th>Type</th><th>Status</th><th>Phase</th><th>Progress</th><th>Milestone</th><th>Date</th><th>RAG</th><th>Owner</th></tr></thead><tbody id="projectsBody"><tr><td colspan="10" class="loading"><div class="spinner"></div><br>Loading...</td></tr></tbody></table></div></div></div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzhhcsd1KB1HG92omuc8qHE_EO2A63xp687KyHTeaUMhXRAHbZG1nU54HM1kjcwVqgKHA/exec';
let allData=null,currentFilter='all';
const TYPE_LABELS={content:'📄 Content',software:'💻 Software',marketing:'📈 Marketing',initiatives:'🚀 Initiatives',sales:'💼 Sales'};
const TYPE_COLORS={content:'#0D7377',software:'#2563A8',marketing:'#6C3483',initiatives:'#E67E22',sales:'#1E7E34'};
const TYPE_BG={content:'#D0F0F0',software:'#EEF4FC',marketing:'#EDE0F5',initiatives:'#FDE8D8',sales:'#D4EDDA'};
async function loadData(){try{const res=await fetch(`${SCRIPT_URL}?action=getData`);allData=await res.json();filterPublicProjects();document.getElementById('lastSync').textContent='Updated '+new Date().toLocaleTimeString();renderAll()}catch(e){allData=getDemoData();filterPublicProjects();renderAll()}}
function filterPublicProjects(){Object.keys(allData.projects).forEach(key=>{allData.projects[key]=allData.projects[key].filter(p=>p.publicVisibility==='Yes')})}
function renderAll(){renderKPIs();renderProjects()}
function renderKPIs(){const k=allData.kpis;const cards=[{val:k.total,lbl:'Total',cls:'navy'},{val:k.active,lbl:'Active',cls:'blue'},{val:k.completed,lbl:'Completed',cls:'green'},{val:k.upcoming,lbl:'Upcoming',cls:'teal'},{val:k.onHold,lbl:'On Hold',cls:'gray'},{val:k.escalated,lbl:'Escalated',cls:'red'}];document.getElementById('kpiCards').innerHTML=cards.map(c=>`<div class="kpi-card ${c.cls}"><div class="kpi-val">${c.val}</div><div class="kpi-lbl">${c.lbl}</div></div>`).join('')}
function renderProjects(filter='',typeFilter=null){const type=typeFilter||currentFilter;const search=filter.toLowerCase();let counter=0,rows='';Object.entries(allData.projects).forEach(([key,list])=>{if(type!=='all'&&type!==key)return;list.forEach(p=>{if(search&&!p.name.toLowerCase().includes(search))return;counter++;const pct=Number(p.progress||0);const pctColor=pct<40?'#C0392B':pct<70?'#FFC107':'#1E7E34';rows+=`<tr><td style="color:var(--muted);font-size:12px">${counter}</td><td style="font-weight:600">${p.name}</td><td><span class="type-tag" style="background:${TYPE_BG[key]};color:${TYPE_COLORS[key]}">${TYPE_LABELS[key]}</span></td><td><span class="badge badge-${p.status?.toLowerCase().replace(' ','')}">${p.status||''}</span></td><td style="font-size:12px">${p.phase||''}</td><td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pctColor}"></div></div><span class="prog-lbl" style="color:${pctColor}">${pct}%</span></div></td><td style="font-size:12px">${p.nextMilestone||''}</td><td style="font-size:12px">${p.milestoneDate||''}</td><td><span class="badge badge-${p.rag?.toLowerCase()}">${p.rag||''}</span></td><td style="font-size:12px">${p.responsible||''}</td></tr>`})});document.getElementById('projectsBody').innerHTML=rows||`<tr><td colspan="10" style="text-align:center;padding:32px">No public projects available</td></tr>`}
function filterType(type,el){currentFilter=type;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderProjects()}
function searchProjects(val){renderProjects(val)}
function switchTab(name){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));event.target.classList.add('active');document.getElementById('tab-'+name).classList.add('active')}
function getDemoData(){const p=(name,status,phase,progress,milestone,date,rag,responsible,pubVis='Yes')=>({name,status,phase,progress,nextMilestone:milestone,milestoneDate:date,rag,responsible,publicVisibility:pubVis});const projects={content:[p('Website Redesign','Active','Design',65,'Launch','15-Jun-25','Green','Sarah K.','Yes')],software:[p('CRM v2','Active','Dev',70,'UAT','25-Jun-25','Green','Rami S.','Yes')],marketing:[p('Q3 Campaign','Active','Exec',60,'Assets','28-Jun-25','Green','Omar B.','Yes')],initiatives:[],sales:[p('Sales Playbook','Active','Draft',50,'Review','20-Jun-25','Green','Nour A.','Yes')]};const kpis={total:4,active:4,completed:0,upcoming:0,onHold:0,escalated:0};return{projects,kpis}}
loadData();setInterval(loadData,60000);
</script>
</body>
</html>
